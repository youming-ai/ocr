<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <title>Parsify — Your Files Never Leave Your Device</title>
    <meta name="description" content="On-device OCR powered by PaddleOCR PP-OCRv6. Extract text from images and PDFs — source files never leave your browser." />
    <link rel="canonical" href="https://parsify.dev/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0d14" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Parsify — Your Files Never Leave Your Device" />
    <meta property="og:description" content="On-device OCR powered by PaddleOCR PP-OCRv6. Extract text from images and PDFs — source files never leave your browser." />
    <meta property="og:url" content="https://parsify.dev/" />
    <meta property="og:site_name" content="Parsify" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://parsify.dev/opengraph-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@parsifydev" />
    <meta name="twitter:title" content="Parsify — Your Files Never Leave Your Device" />
    <meta name="twitter:description" content="On-device OCR powered by PaddleOCR PP-OCRv6. Extract text from images and PDFs — source files never leave your browser." />
    <meta name="twitter:image" content="https://parsify.dev/opengraph-image.png" />
    <script>
      var stored = localStorage.getItem('parsify-theme');
      var theme = stored !== null ? stored : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (theme === 'dark') document.documentElement.classList.add('dark');

      var storedLang = localStorage.getItem('parsify-lang');
      var lang = (storedLang === 'en' || storedLang === 'zh' || storedLang === 'ja') ? storedLang
        : ((navigator.language || '').toLowerCase().indexOf('zh') === 0 ? 'zh' : 'en');
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang;
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Parsify",
      "url": "https://parsify.dev",
      "description": "On-device OCR powered by PaddleOCR PP-OCRv6. Extract text from images and PDFs — source files never leave your browser.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "publisher": { "@type": "Organization", "name": "Parsify.dev", "url": "https://parsify.dev" }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client.tsx"></script>
  </body>
</html>
